<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consensus — The World's Opinion, Live</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #030712; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes fillBar { from{width:0} to{width:var(--w)} }
    .live-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#34d399; animation:pulse 1.5s infinite; }
    .bar { animation: fillBar 0.8s cubic-bezier(0.4,0,0.2,1) forwards; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect } = React;
    const { createClient } = supabase;

    const db = createClient(
      'https://nxwublmqbysqboadwqav.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54d3VibG1xYnlzcWJvYWR3cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDY1MzEsImV4cCI6MjA4OTA4MjUzMX0.mD24igp7ccd_y70Up3Pq-8pEBI7Y7lXjg160bvBLM8E'
    );

    const COLORS = ['#818cf8','#34d399','#fbbf24','#f87171','#a78bfa','#38bdf8'];

    const getFlag = (code) => {
      if (!code || code === 'XX') return '🌍';
      try { return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 - 65 + c.charCodeAt(0))); }
      catch { return '🌍'; }
    };

    const e = React.createElement;

    // ── Router ────────────────────────────────────────────────
    const useRouter = () => {
      const parse = () => {
        const hash = window.location.hash.replace('#','');
        if (hash.startsWith('/q/')) return { page:'question', id: hash.slice(3) };
        if (hash === '/post') return { page:'post', id: null };
        return { page:'home', id: null };
      };
      const [route, setRoute] = useState(parse);
      useEffect(() => {
        const fn = () => setRoute(parse());
        window.addEventListener('hashchange', fn);
        return () => window.removeEventListener('hashchange', fn);
      }, []);
      return route;
    };

    // ── NavBar ────────────────────────────────────────────────
    const NavBar = () =>
      e('nav', { style:{position:'fixed',top:0,left:0,right:0,zIndex:50,background:'rgba(3,7,18,0.96)',borderBottom:'1px solid #1f2937'} },
        e('div', { style:{maxWidth:640,margin:'0 auto',padding:'0 16px',height:56,display:'flex',alignItems:'center',justifyContent:'space-between'} },
          e('a', { href:'#/', style:{fontSize:20,fontWeight:900} },
            e('span',{style:{color:'#818cf8'}},'con'),'sensus'
          ),
          e('a', { href:'#/post', style:{background:'#4f46e5',color:'white',padding:'8px 18px',borderRadius:999,fontSize:14,fontWeight:700} },
            '+ Ask the world'
          )
        )
      );

    // ── Home ──────────────────────────────────────────────────
    const Home = () => {
      const [questions, setQuestions] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        db.from('questions').select('*').order('created_at',{ascending:false})
          .then(({data}) => { setQuestions(data||[]); setLoading(false); });
      }, []);

      return e('div', { style:{maxWidth:640,margin:'0 auto',padding:'72px 16px 64px'} },
        // Hero
        e('div', { style:{textAlign:'center',padding:'32px 0 24px'} },
          e('h1', { style:{fontSize:40,fontWeight:900,lineHeight:1.2,marginBottom:12,background:'linear-gradient(135deg,#818cf8,#a78bfa)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'} },
            'What does the world think?'
          ),
          e('p', { style:{color:'#9ca3af',fontSize:17} }, 'Vote. See the planet respond. Share the result.')
        ),
        e('div', { style:{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:24,color:'#6b7280',fontSize:13} },
          e('span',{className:'live-dot'}), 'Results update in real time'
        ),
        loading
          ? e('div',{style:{textAlign:'center',color:'#4b5563',padding:80,fontSize:17}},'Loading...')
          : questions.length === 0
          ? e('div',{style:{textAlign:'center',padding:80}},
              e('div',{style:{fontSize:48,marginBottom:12}},'🌍'),
              e('p',{style:{color:'#9ca3af',fontSize:17}},'No questions yet — post the first one!')
            )
          : e('div',{style:{display:'flex',flexDirection:'column',gap:10}},
              ...questions.map(q => e(QuestionCard,{key:q.id,question:q}))
            )
      );
    };

    // ── QuestionCard ──────────────────────────────────────────
    const QuestionCard = ({question}) => {
      const voted = localStorage.getItem('voted_'+question.id) !== null;
      return e('a', { href:'#/q/'+question.id,
        style:{display:'block',background:'#0f172a',border:'1px solid #1e293b',borderRadius:16,padding:'18px 20px',transition:'border-color 0.2s'}},
        e('p',{style:{fontSize:16,fontWeight:600,marginBottom:10,lineHeight:1.4}}, question.question_text),
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12}},
          e('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
            ...question.options.slice(0,3).map((opt,i) =>
              e('span',{key:i,style:{fontSize:11,padding:'2px 9px',borderRadius:999,border:'1px solid '+COLORS[i%COLORS.length]+'55',color:COLORS[i%COLORS.length],background:COLORS[i%COLORS.length]+'15'}}, opt)
            ),
            question.options.length > 3 && e('span',{style:{fontSize:11,color:'#4b5563'}},'+'+( question.options.length-3)+' more')
          ),
          e('span',{style:{fontSize:13,flexShrink:0,color:voted?'#34d399':'#6366f1',fontWeight:600}}, voted?'✓ Voted':'Vote →')
        )
      );
    };

    // ── PostPage ──────────────────────────────────────────────
    const PostPage = () => {
      const [question, setQuestion] = useState('');
      const [options, setOptions] = useState(['','']);
      const [posting, setPosting] = useState(false);

      const post = async () => {
        const valid = options.filter(o=>o.trim()!=='');
        if (!question.trim() || valid.length < 2) { alert('Need a question + at least 2 options.'); return; }
        setPosting(true);
        const {data,error} = await db.from('questions').insert({question_text:question.trim(),options:valid}).select().single();
        setPosting(false);
        if (error) { alert('Error: '+error.message); return; }
        window.location.hash = '/q/'+data.id;
      };

      const inp = {width:'100%',background:'#1e293b',border:'1px solid #334155',color:'white',borderRadius:10,padding:'11px 13px',fontSize:15,outline:'none'};

      return e('div',{style:{maxWidth:640,margin:'0 auto',padding:'72px 16px 64px'}},
        e('h2',{style:{fontSize:26,fontWeight:900,marginBottom:6}},'Ask the world'),
        e('p',{style:{color:'#6b7280',marginBottom:24,fontSize:15}},'Post a question and watch the votes roll in live.'),
        e('div',{style:{background:'#0f172a',border:'1px solid #1e293b',borderRadius:16,padding:24}},
          e('textarea',{placeholder:'e.g. Is a hotdog a sandwich?',value:question,onChange:ev=>setQuestion(ev.target.value),
            style:{...inp,height:100,resize:'none',marginBottom:14,fontSize:16}}),
          e('div',{style:{display:'flex',flexDirection:'column',gap:8,marginBottom:14}},
            ...options.map((opt,i)=>
              e('div',{key:i,style:{display:'flex',alignItems:'center',gap:8}},
                e('div',{style:{width:26,height:26,borderRadius:'50%',background:COLORS[i%COLORS.length]+'25',color:COLORS[i%COLORS.length],display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}},i+1),
                e('input',{type:'text',placeholder:'Option '+(i+1)+(i<2?' (required)':''),value:opt,
                  onChange:ev=>{const n=[...options];n[i]=ev.target.value;setOptions(n);},style:{...inp,flex:1}}),
                options.length>2 && e('button',{onClick:()=>setOptions(options.filter((_,j)=>j!==i)),
                  style:{background:'none',border:'none',color:'#475569',cursor:'pointer',fontSize:20,padding:'0 4px',lineHeight:1}},'×')
              )
            )
          ),
          options.length<4 && e('button',{onClick:()=>setOptions([...options,'']),
            style:{background:'none',border:'none',color:'#818cf8',cursor:'pointer',fontSize:14,padding:'0 0 14px',display:'block'}},
            '+ Add another option'),
          e('button',{onClick:post,disabled:posting,
            style:{width:'100%',padding:15,borderRadius:12,border:'none',background:posting?'#1e293b':'#4f46e5',color:'white',fontWeight:700,fontSize:16,cursor:posting?'not-allowed':'pointer'}},
            posting?'Posting...':'🌍 Post to the World')
        )
      );
    };

    // ── ResultBars — custom chart, no library needed ──────────
    const ResultBars = ({options, votes}) => {
      const total = votes.length;
      return e('div',{style:{display:'flex',flexDirection:'column',gap:14}},
        ...options.map((opt,i)=>{
          const count = votes.filter(v=>v.option_index===i).length;
          const pct = total>0 ? Math.round((count/total)*100) : 0;
          return e('div',{key:i},
            e('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:14}},
              e('span',{style:{fontWeight:600,color:COLORS[i%COLORS.length]}},'Option '+(i+1)+': '+opt),
              e('span',{style:{fontWeight:800,color:COLORS[i%COLORS.length]}},(total>0?pct+'%':'—'))
            ),
            e('div',{style:{background:'#1e293b',borderRadius:999,height:10,overflow:'hidden'}},
              e('div',{style:{height:'100%',borderRadius:999,background:COLORS[i%COLORS.length],width:pct+'%',transition:'width 0.9s cubic-bezier(0.4,0,0.2,1)'}})
            ),
            e('div',{style:{fontSize:12,color:'#475569',marginTop:4}},count+' vote'+(count!==1?'s':''))
          );
        })
      );
    };

    // ── QuestionPage ──────────────────────────────────────────
    const QuestionPage = ({id}) => {
      const [question, setQuestion] = useState(null);
      const [votes, setVotes] = useState([]);
      const [myVote, setMyVote] = useState(null);
      const [country, setCountry] = useState('XX');
      const [voting, setVoting] = useState(false);
      const [msg, setMsg] = useState('');

      useEffect(()=>{
        const s=localStorage.getItem('voted_'+id);
        if(s!==null) setMyVote(parseInt(s,10));
      },[id]);

      useEffect(()=>{
        fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>setCountry(d.country_code||'XX')).catch(()=>{});
      },[]);

      useEffect(()=>{
        if(!id) return;
        db.from('questions').select('*').eq('id',id).single().then(({data})=>setQuestion(data));
        const load = async()=>{ const {data}=await db.from('votes').select('*').eq('question_id',id); setVotes(data||[]); };
        load();
        const ch = db.channel('votes:'+id)
          .on('postgres_changes',{event:'INSERT',schema:'public',table:'votes',filter:'question_id=eq.'+id},load)
          .subscribe();
        return ()=>db.removeChannel(ch);
      },[id]);

      const castVote = async(index)=>{
        if(myVote!==null||voting) return;
        setVoting(true);
        const {error}=await db.from('votes').insert({question_id:id,option_index:index,country_code:country});
        setVoting(false);
        if(error){alert('Vote failed: '+error.message);return;}
        setMyVote(index);
        localStorage.setItem('voted_'+id,String(index));
      };

      const copyLink = ()=>{
        navigator.clipboard.writeText(window.location.href)
          .then(()=>{setMsg('✓ Link copied!');setTimeout(()=>setMsg(''),2000);})
          .catch(()=>setMsg('Copy the URL manually.'));
      };

      if(!question) return e('div',{style:{paddingTop:120,textAlign:'center',color:'#4b5563',fontSize:17}},'Loading...');

      const total = votes.length;
      const countryStats = votes.reduce((acc,v)=>{const c=v.country_code||'XX';acc[c]=(acc[c]||0)+1;return acc;},{});
      const topCountries = Object.entries(countryStats).sort((a,b)=>b[1]-a[1]).slice(0,6);
      const hasVoted = myVote!==null;

      return e('div',{style:{maxWidth:640,margin:'0 auto',padding:'64px 16px 64px'}},
        e('a',{href:'#/',style:{color:'#818cf8',fontSize:14,display:'inline-block',margin:'16px 0 20px'}},'← All Questions'),
        e('h1',{style:{fontSize:26,fontWeight:900,lineHeight:1.35,marginBottom:28}},question.question_text),

        // Vote buttons
        e('div',{style:{display:'flex',flexDirection:'column',gap:10,marginBottom:32}},
          ...question.options.map((opt,i)=>{
            const count=votes.filter(v=>v.option_index===i).length;
            const pct=total>0?Math.round((count/total)*100):0;
            const isMe=myVote===i;
            return e('button',{key:i,onClick:()=>castVote(i),disabled:hasVoted||voting,
              style:{position:'relative',overflow:'hidden',textAlign:'left',padding:'14px 16px',borderRadius:14,
                border:'1px solid '+(isMe?'#6366f1':'#1e293b'),background:isMe?'#1e1b4b':'#0f172a',
                color:'white',fontWeight:600,fontSize:15,cursor:hasVoted?'default':'pointer',width:'100%'}},
              hasVoted && e('div',{style:{position:'absolute',left:0,top:0,height:'100%',background:COLORS[i%COLORS.length],opacity:0.18,width:pct+'%',transition:'width 0.8s ease'}}),
              e('div',{style:{position:'relative',display:'flex',justifyContent:'space-between',alignItems:'center'}},
                e('span',{style:{display:'flex',alignItems:'center',gap:8}},
                  isMe && e('span',{style:{color:'#818cf8'}},'✓ '), opt
                ),
                hasVoted && e('span',{style:{fontWeight:800,fontSize:15,color:COLORS[i%COLORS.length]}},pct+'%')
              )
            );
          })
        ),

        // Results card
        e('div',{id:'results-card',style:{background:'#0f172a',border:'1px solid #1e293b',borderRadius:20,padding:24,marginBottom:12}},
          e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}},
            e('div',null,
              e('h2',{style:{fontSize:18,fontWeight:900}},'Live Results'),
              e('p',{style:{color:'#6b7280',fontSize:13,marginTop:4,lineHeight:1.4}},question.question_text)
            ),
            e('div',{style:{textAlign:'right',flexShrink:0,marginLeft:12}},
              e('div',{style:{display:'flex',alignItems:'center',gap:6,justifyContent:'flex-end',marginBottom:2}},
                e('span',{className:'live-dot'}),
                e('span',{style:{fontSize:12,color:'#6b7280'}},'LIVE')
              ),
              e('div',{style:{fontSize:26,fontWeight:900}},total),
              e('div',{style:{fontSize:11,color:'#475569'}},'votes')
            )
          ),

          total===0
            ? e('div',{style:{textAlign:'center',color:'#4b5563',padding:'40px 0'}},
                e('div',{style:{fontSize:36,marginBottom:8}},'🗳️'),
                e('p',null,'No votes yet — be the first!')
              )
            : e('div',null,
                e(ResultBars,{options:question.options,votes}),
                topCountries.length>0 && e('div',{style:{marginTop:24,paddingTop:20,borderTop:'1px solid #1e293b'}},
                  e('p',{style:{fontSize:11,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:2,marginBottom:14}},'By Country'),
                  e('div',{style:{display:'flex',flexDirection:'column',gap:10}},
                    ...topCountries.map(([code,count])=>{
                      const pct=Math.round((count/total)*100);
                      return e('div',{key:code,style:{display:'flex',alignItems:'center',gap:10}},
                        e('span',{style:{fontSize:18,width:26,textAlign:'center',flexShrink:0}},getFlag(code)),
                        e('div',{style:{flex:1,background:'#1e293b',borderRadius:999,overflow:'hidden',height:7}},
                          e('div',{style:{height:'100%',background:'#6366f1',width:pct+'%',transition:'width 0.8s ease',borderRadius:999}})
                        ),
                        e('span',{style:{fontSize:12,color:'#9ca3af',width:60,textAlign:'right',flexShrink:0}},code+' · '+pct+'%')
                      );
                    })
                  )
                )
              ),

          e('div',{style:{marginTop:20,paddingTop:16,borderTop:'1px solid #1e293b',display:'flex',justifyContent:'space-between',alignItems:'center'}},
            e('span',{style:{fontSize:12,fontWeight:900,color:'#818cf8'}},'consensus'),
            e('span',{style:{fontSize:12,color:'#334155'}},new Date().toLocaleDateString())
          )
        ),

        // Share
        e('div',{style:{display:'flex',flexDirection:'column',gap:10}},
          e('button',{onClick:copyLink,
            style:{width:'100%',padding:14,borderRadius:14,border:'1px solid #1e293b',background:'transparent',color:'#9ca3af',fontWeight:600,fontSize:15,cursor:'pointer'}},
            '🔗 Copy Link to Share'
          ),
          msg && e('p',{style:{textAlign:'center',fontSize:13,color:'#34d399',margin:0}},msg)
        )
      );
    };

    // ── App ───────────────────────────────────────────────────
    const App = () => {
      const route = useRouter();
      return e('div',{style:{minHeight:'100vh'}},
        e(NavBar,null),
        route.page==='home'     && e(Home,null),
        route.page==='post'     && e(PostPage,null),
        route.page==='question' && e(QuestionPage,{id:route.id})
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
  </script>
</body>
</html>
