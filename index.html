<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Default title + description (overwritten per page by JS) ── -->
  <title>Consensus — The World's Opinion, Live</title>
  <meta name="description" content="Vote on anything. See live results from around the planet. Real-time polls with country and demographic breakdowns." />

  <!-- ── Open Graph (Facebook, WhatsApp, Discord, iMessage) ── -->
  <meta property="og:site_name"   content="Consensus" />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://kynaruniverse.github.io/consensus/" />
  <meta property="og:title"       content="Consensus — The World's Opinion, Live" />
  <meta property="og:description" content="Vote on anything. See live results from around the planet." />
  <meta property="og:image"       content="https://kynaruniverse.github.io/consensus/og-default.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- ── Twitter / X card ── -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@consensus" />
  <meta name="twitter:title"       content="Consensus — The World's Opinion, Live" />
  <meta name="twitter:description" content="Vote on anything. See live results from around the planet." />
  <meta name="twitter:image"       content="https://kynaruniverse.github.io/consensus/og-default.png" />

  <!-- ── Canonical URL ── -->
  <link rel="canonical" href="https://kynaruniverse.github.io/consensus/" />

  <!-- ── Favicon (emoji fallback — works everywhere) ── -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />

  <!-- ── Styles ── -->
  <link rel="stylesheet" href="./css/styles.css" />

  <!-- ── CDN globals (must load before modules) ── -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
