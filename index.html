<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consensus — The World's Opinion, Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2/umd/Recharts.min.js"></script>
  <script src="https://unpkg.com/html2canvas@1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .live-dot { animation: pulse-dot 1.5s infinite; }
  </style>
</head>
<body style="background:#030712;color:white;margin:0;font-family:sans-serif">
  <div id="root"></div>

  <script>
    // ── No Babel needed — plain JS only ──────────────────────

    const { useState, useEffect, createElement: h } = React;
    const { PieChart, Pie, Cell, Tooltip, Legend } = Recharts;
    const { createClient } = supabase;

    const db = createClient(
      'https://nxwublmqbysqboadwqav.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54d3VibG1xYnlzcWJvYWR3cWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDY1MzEsImV4cCI6MjA4OTA4MjUzMX0.mD24igp7ccd_y70Up3Pq-8pEBI7Y7lXjg160bvBLM8E'
    );

    const COLORS = ['#818cf8','#34d399','#fbbf24','#f87171','#a78bfa','#38bdf8'];

    const getFlag = (code) => {
      if (!code || code === 'XX') return '🌍';
      try { return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 - 65 + c.charCodeAt(0))); }
      catch { return '🌍'; }
    };

    // ── Simple hash router (no CDN needed) ───────────────────
    // page = 'home' | 'post' | 'question'
    // questionId = uuid string when page === 'question'
    const useRouter = () => {
      const parse = () => {
        const h = window.location.hash.replace('#','');
        if (h.startsWith('/q/')) return { page:'question', id: h.slice(3) };
        if (h === '/post') return { page:'post', id: null };
        return { page:'home', id: null };
      };
      const [route, setRoute] = useState(parse);
      useEffect(() => {
        const handler = () => setRoute(parse());
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);
      const go = (path) => { window.location.hash = path; };
      return { route, go };
    };

    // ── NavBar ────────────────────────────────────────────────
    const NavBar = ({ go }) =>
      h('nav', { style:{position:'fixed',top:0,left:0,right:0,zIndex:50,background:'rgba(3,7,18,0.95)',borderBottom:'1px solid #1f2937',backdropFilter:'blur(12px)'} },
        h('div', { style:{maxWidth:640,margin:'0 auto',padding:'0 16px',height:56,display:'flex',alignItems:'center',justifyContent:'space-between'} },
          h('a', { href:'#/', style:{color:'white',textDecoration:'none',fontSize:20,fontWeight:900} },
            h('span', { style:{color:'#818cf8'} }, 'con'), 'sensus'
          ),
          h('a', { href:'#/post', style:{background:'#4f46e5',color:'white',textDecoration:'none',padding:'8px 20px',borderRadius:999,fontSize:14,fontWeight:700} },
            '+ Ask the world'
          )
        )
      );

    // ── Home ──────────────────────────────────────────────────
    const Home = ({ go }) => {
      const [questions, setQuestions] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        db.from('questions').select('*').order('created_at',{ascending:false})
          .then(({ data }) => { setQuestions(data||[]); setLoading(false); });
      }, []);

      return h('div', { style:{paddingTop:80,paddingBottom:64,padding:'80px 16px 64px',maxWidth:640,margin:'0 auto'} },
        // Hero
        h('div', { style:{textAlign:'center',padding:'40px 0 16px'} },
          h('h1', { style:{fontSize:44,fontWeight:900,lineHeight:1.15,marginBottom:12} },
            h('span', { style:{background:'linear-gradient(135deg,#818cf8,#a78bfa)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'} },
              'What does the world think?'
            )
          ),
          h('p', { style:{color:'#9ca3af',fontSize:18,margin:0} }, 'Vote. See the planet respond. Share the result.')
        ),
        // Live dot
        h('div', { style:{display:'flex',alignItems:'center',justifyContent:'center',gap:8,margin:'24px 0',color:'#6b7280',fontSize:14} },
          h('span', { className:'live-dot', style:{width:8,height:8,borderRadius:'50%',background:'#34d399',display:'inline-block'} }),
          'Results update in real time'
        ),
        // Questions
        loading
          ? h('div', { style:{textAlign:'center',color:'#4b5563',padding:'80px 0',fontSize:18} }, 'Loading...')
          : questions.length === 0
            ? h('div', { style:{textAlign:'center',padding:'80px 0'} },
                h('div', { style:{fontSize:48,marginBottom:16} }, '🌍'),
                h('p', { style:{color:'#9ca3af',fontSize:18,marginBottom:8} }, 'No questions yet.'),
                h('p', { style:{color:'#4b5563'} }, 'Be the first to ask the world something.')
              )
            : h('div', { style:{display:'flex',flexDirection:'column',gap:12} },
                ...questions.map(q => h(QuestionCard, { key:q.id, question:q }))
              )
      );
    };

    // ── QuestionCard ──────────────────────────────────────────
    const QuestionCard = ({ question }) => {
      const voted = localStorage.getItem(`voted_${question.id}`) !== null;
      return h('a', {
        href: `#/q/${question.id}`,
        style:{display:'block',background:'#111827',border:'1px solid #1f2937',borderRadius:16,padding:20,textDecoration:'none',color:'white'}
      },
        h('p', { style:{fontSize:17,fontWeight:600,marginBottom:12,lineHeight:1.4} }, question.question_text),
        h('div', { style:{display:'flex',justifyContent:'space-between',alignItems:'flex-end',gap:12} },
          h('div', { style:{display:'flex',gap:6,flexWrap:'wrap'} },
            ...question.options.slice(0,3).map((opt,i) =>
              h('span', { key:i, style:{fontSize:12,padding:'3px 10px',borderRadius:999,border:`1px solid ${COLORS[i%COLORS.length]}44`,color:COLORS[i%COLORS.length],background:COLORS[i%COLORS.length]+'11'} }, opt)
            ),
            question.options.length > 3 && h('span', { style:{fontSize:12,color:'#4b5563',padding:'3px 0'} }, `+${question.options.length-3} more`)
          ),
          h('span', { style:{fontSize:14,flexShrink:0,color: voted?'#34d399':'#6366f1'} }, voted ? '✓ Voted' : 'Vote →')
        )
      );
    };

    // ── PostPage ──────────────────────────────────────────────
    const PostPage = ({ go }) => {
      const [question, setQuestion] = useState('');
      const [options, setOptions] = useState(['','']);
      const [posting, setPosting] = useState(false);

      const addOption = () => { if (options.length < 4) setOptions([...options,'']); };
      const removeOption = (i) => { if (options.length > 2) setOptions(options.filter((_,idx)=>idx!==i)); };

      const post = async () => {
        const valid = options.filter(o=>o.trim()!=='');
        if (!question.trim() || valid.length < 2) { alert('Add a question and at least 2 options.'); return; }
        setPosting(true);
        const { data, error } = await db.from('questions').insert({ question_text:question.trim(), options:valid }).select().single();
        setPosting(false);
        if (error) { alert('Error: '+error.message); return; }
        window.location.hash = `/q/${data.id}`;
      };

      const inputStyle = { width:'100%',background:'#1f2937',border:'1px solid #374151',color:'white',borderRadius:12,padding:12,fontSize:15,outline:'none',boxSizing:'border-box' };

      return h('div', { style:{paddingTop:80,paddingBottom:64,padding:'80px 16px 64px',maxWidth:640,margin:'0 auto'} },
        h('h2', { style:{fontSize:28,fontWeight:900,marginBottom:8} }, 'Ask the world'),
        h('p', { style:{color:'#6b7280',marginBottom:24} }, 'Post a question and watch the votes roll in live.'),
        h('div', { style:{background:'#111827',border:'1px solid #1f2937',borderRadius:16,padding:24} },
          h('textarea', { placeholder:'e.g. Is a hotdog a sandwich?', style:{...inputStyle,height:112,resize:'none',marginBottom:16,fontSize:17}, value:question, onChange:e=>setQuestion(e.target.value) }),
          h('div', { style:{display:'flex',flexDirection:'column',gap:8,marginBottom:16} },
            ...options.map((opt,i) =>
              h('div', { key:i, style:{display:'flex',alignItems:'center',gap:8} },
                h('div', { style:{width:28,height:28,borderRadius:'50%',background:COLORS[i%COLORS.length]+'22',color:COLORS[i%COLORS.length],display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0} }, i+1),
                h('input', { type:'text', placeholder:`Option ${i+1}${i<2?' (required)':''}`, style:{...inputStyle,flex:1}, value:opt, onChange:e=>{ const n=[...options];n[i]=e.target.value;setOptions(n); } }),
                options.length > 2 && h('button', { onClick:()=>removeOption(i), style:{background:'none',border:'none',color:'#4b5563',cursor:'pointer',fontSize:22,padding:'0 4px'} }, '×')
              )
            )
          ),
          options.length < 4 && h('button', { onClick:addOption, style:{background:'none',border:'none',color:'#818cf8',cursor:'pointer',fontSize:14,padding:0,marginBottom:16,display:'block'} }, '+ Add another option'),
          h('button', { onClick:post, disabled:posting, style:{width:'100%',padding:'16px',borderRadius:12,border:'none',background:posting?'#374151':'#4f46e5',color:'white',fontWeight:700,fontSize:17,cursor:posting?'not-allowed':'pointer'} },
            posting ? 'Posting...' : '🌍 Post to the World'
          )
        )
      );
    };

    // ── QuestionPage ──────────────────────────────────────────
    const QuestionPage = ({ id }) => {
      const [question, setQuestion] = useState(null);
      const [votes, setVotes] = useState([]);
      const [myVote, setMyVote] = useState(null);
      const [country, setCountry] = useState('XX');
      const [voting, setVoting] = useState(false);
      const [shareMsg, setShareMsg] = useState('');

      useEffect(() => {
        const s = localStorage.getItem(`voted_${id}`);
        if (s !== null) setMyVote(parseInt(s,10));
      }, [id]);

      useEffect(() => {
        fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>setCountry(d.country_code||'XX')).catch(()=>{});
      }, []);

      useEffect(() => {
        if (!id) return;
        db.from('questions').select('*').eq('id',id).single().then(({data})=>setQuestion(data));
        const loadVotes = async () => { const {data} = await db.from('votes').select('*').eq('question_id',id); setVotes(data||[]); };
        loadVotes();
        const ch = db.channel(`votes:${id}`)
          .on('postgres_changes',{event:'INSERT',schema:'public',table:'votes',filter:`question_id=eq.${id}`},loadVotes)
          .subscribe();
        return () => db.removeChannel(ch);
      }, [id]);

      const castVote = async (index) => {
        if (myVote !== null || voting) return;
        setVoting(true);
        const { error } = await db.from('votes').insert({ question_id:id, option_index:index, country_code:country });
        setVoting(false);
        if (error) { alert('Vote failed: '+error.message); return; }
        setMyVote(index);
        localStorage.setItem(`voted_${id}`, String(index));
      };

      const shareCard = async () => {
        const el = document.getElementById('results-card');
        if (!el) return;
        setShareMsg('Generating...');
        try {
          const canvas = await html2canvas(el,{backgroundColor:'#0f172a',scale:2});
          const a = document.createElement('a');
          a.download = `consensus-${id.slice(0,8)}.png`;
          a.href = canvas.toDataURL('image/png');
          a.click();
          setShareMsg('');
        } catch(e) { setShareMsg(''); alert('Image failed: '+e.message); }
      };

      const copyLink = () => {
        navigator.clipboard.writeText(window.location.href)
          .then(()=>{ setShareMsg('✓ Link copied!'); setTimeout(()=>setShareMsg(''),2000); })
          .catch(()=>setShareMsg('Copy the URL manually.'));
      };

      if (!question) return h('div',{style:{paddingTop:120,textAlign:'center',color:'#4b5563',fontSize:18}},'Loading...');

      const total = votes.length;
      const chartData = question.options.map((opt,i)=>({ name:opt, value:votes.filter(v=>v.option_index===i).length }));
      const countryStats = votes.reduce((acc,v)=>{ const c=v.country_code||'XX'; acc[c]=(acc[c]||0)+1; return acc; },{});
      const topCountries = Object.entries(countryStats).sort((a,b)=>b[1]-a[1]).slice(0,8);

      return h('div', { style:{paddingTop:64,paddingBottom:64,padding:'64px 16px 64px',maxWidth:640,margin:'0 auto'} },
        h('a', { href:'#/', style:{color:'#818cf8',textDecoration:'none',fontSize:14,display:'inline-block',margin:'16px 0 24px'} }, '← All Questions'),
        h('h1', { style:{fontSize:28,fontWeight:900,lineHeight:1.3,marginBottom:24} }, question.question_text),

        // Vote buttons
        h('div', { style:{display:'flex',flexDirection:'column',gap:12,marginBottom:40} },
          ...question.options.map((opt,i) => {
            const count = votes.filter(v=>v.option_index===i).length;
            const pct = total > 0 ? Math.round((count/total)*100) : 0;
            const isMyVote = myVote === i;
            const hasVoted = myVote !== null;
            return h('button', {
              key:i, onClick:()=>castVote(i), disabled:hasVoted||voting,
              style:{position:'relative',overflow:'hidden',textAlign:'left',padding:'16px',borderRadius:16,border:`1px solid ${isMyVote?'#6366f1':'#1f2937'}`,background:isMyVote?'#1e1b4b':'#111827',color:'white',fontWeight:600,cursor:hasVoted?'not-allowed':'pointer',width:'100%',fontSize:15}
            },
              hasVoted && h('div',{style:{position:'absolute',left:0,top:0,height:'100%',borderRadius:16,opacity:0.2,background:COLORS[i%COLORS.length],width:`${pct}%`,transition:'width 0.8s ease'}}),
              h('div',{style:{position:'relative',display:'flex',justifyContent:'space-between',alignItems:'center'}},
                h('span',{style:{display:'flex',alignItems:'center',gap:8}},
                  isMyVote && h('span',{style:{color:'#818cf8'}},'✓'), opt
                ),
                hasVoted && h('span',{style:{fontWeight:900,color:COLORS[i%COLORS.length]}})`${pct}%`
              )
            );
          })
        ),

        // Results card
        h('div', { id:'results-card', style:{background:'#0f172a',border:'1px solid #1e293b',borderRadius:24,padding:24} },
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}},
            h('div',null,
              h('h2',{style:{fontSize:20,fontWeight:900,margin:0}},'Live Results'),
              h('p',{style:{color:'#6b7280',fontSize:13,margin:'4px 0 0',lineHeight:1.4}},question.question_text)
            ),
            h('div',{style:{textAlign:'right'}},
              h('div',{style:{display:'flex',alignItems:'center',gap:6,justifyContent:'flex-end'}},
                h('span',{className:'live-dot',style:{width:8,height:8,borderRadius:'50%',background:'#34d399',display:'inline-block'}}),
                h('span',{style:{fontSize:12,color:'#6b7280'}},'LIVE')
              ),
              h('div',{style:{fontSize:28,fontWeight:900,margin:'2px 0 0'}},total),
              h('div',{style:{fontSize:12,color:'#4b5563'}},'votes')
            )
          ),
          total === 0
            ? h('div',{style:{textAlign:'center',color:'#4b5563',padding:'48px 0'}},
                h('div',{style:{fontSize:40,marginBottom:12}},'🗳️'),
                h('p',null,'No votes yet — be the first!')
              )
            : h('div',null,
                h('div',{style:{display:'flex',justifyContent:'center',marginBottom:16}},
                  h(PieChart,{width:280,height:250},
                    h(Pie,{data:chartData,dataKey:'value',nameKey:'name',cx:'50%',cy:'50%',outerRadius:95,paddingAngle:3,label:({percent})=>percent>0.04?`${Math.round(percent*100)}%`:'',labelLine:false},
                      ...chartData.map((_,i)=>h(Cell,{key:i,fill:COLORS[i%COLORS.length]}))
                    ),
                    h(Tooltip,{formatter:(v,n)=>[`${v} votes`,n]}),
                    h(Legend,null)
                  )
                ),
                topCountries.length > 0 && h('div',{style:{borderTop:'1px solid #1e293b',paddingTop:20}},
                  h('h3',{style:{fontSize:11,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:2,marginBottom:16}},'By Country'),
                  h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
                    ...topCountries.map(([code,count])=>{
                      const pct=Math.round((count/total)*100);
                      return h('div',{key:code,style:{display:'flex',alignItems:'center',gap:12}},
                        h('span',{style:{fontSize:20,width:28,textAlign:'center'}},getFlag(code)),
                        h('div',{style:{flex:1,background:'#1e293b',borderRadius:999,overflow:'hidden',height:8}},
                          h('div',{style:{height:'100%',background:'#6366f1',width:`${pct}%`,transition:'width 0.8s ease',borderRadius:999}})
                        ),
                        h('span',{style:{fontSize:13,color:'#9ca3af',width:64,textAlign:'right',flexShrink:0}},`${code} · ${pct}%`)
                      );
                    })
                  )
                )
              ),
          h('div',{style:{marginTop:24,paddingTop:16,borderTop:'1px solid #1e293b',display:'flex',justifyContent:'space-between',alignItems:'center'}},
            h('span',{style:{fontSize:12,fontWeight:900,color:'#818cf8'}},'consensus'),
            h('span',{style:{fontSize:12,color:'#374151'}},new Date().toLocaleDateString())
          )
        ),

        // Share buttons
        h('div',{style:{marginTop:16,display:'flex',flexDirection:'column',gap:12}},
          h('button',{onClick:shareCard,style:{width:'100%',padding:'16px',borderRadius:16,border:'none',background:'#059669',color:'white',fontWeight:700,fontSize:17,cursor:'pointer'}},
            '📸 Save & Share Result Card'
          ),
          h('button',{onClick:copyLink,style:{width:'100%',padding:'12px',borderRadius:16,border:'1px solid #1f2937',background:'transparent',color:'#9ca3af',fontWeight:600,fontSize:14,cursor:'pointer'}},
            '🔗 Copy Link to Share'
          ),
          shareMsg && h('p',{style:{textAlign:'center',fontSize:14,color:'#34d399',margin:0}},shareMsg)
        )
      );
    };

    // ── App ───────────────────────────────────────────────────
    const App = () => {
      const { route } = useRouter();
      return h('div', { style:{minHeight:'100vh',background:'#030712',color:'white'} },
        h(NavBar, null),
        route.page === 'home'     && h(Home, null),
        route.page === 'post'     && h(PostPage, null),
        route.page === 'question' && h(QuestionPage, { id: route.id })
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
  </script>
</body>
</html>
