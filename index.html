<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consensus - World's Opinions Live</title>
  <!-- Tailwind CSS CDN (for beautiful styling) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM (production minified) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- React Router DOM for multi-page feel -->
  <script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.production.min.js"></script>

  <div id="root"></div>
